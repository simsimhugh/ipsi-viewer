name: Realestate Sync (전국)

# 부동산 (매매 + 전월세) 월 1회 incremental sync.
# Workflow_dispatch 전용 — GitHub UI "Run workflow" 또는 CLI:
#   gh workflow run realestate-sync.yml -f months=202504 -f type=both
on:
  # 자동 주 1회 — 매주 일요일 KST 03:00 (UTC 18:00 토요일)
  # rolling 12개월 + force-recent 2 default — 진행 중 월 신규 거래도 매번 포착
  schedule:
    - cron: "0 18 * * 6"
  workflow_dispatch:
    inputs:
      months:
        description: "수집 월 (콤마 구분 YYYYMM). 빈 값이면 recent N개월 자동"
        default: ""
        required: false
      recent:
        description: "최근 N개월 (months 빈 값일 때만 사용)"
        default: "12"
        required: false
      force_recent:
        description: "최근 N개월은 idempotent skip 우회 (진행 중 월 + 신규 거래 재포착)"
        default: "2"
        required: false
      lawd_filter:
        description: "시·군·구 코드 콤마 구분. 빈 값이면 전국 (예: 11680,11710)"
        default: ""
        required: false
      type:
        description: "trade / rent / both"
        default: "both"
        required: false
      workers:
        description: "동시 워커 (data.go.kr 부담 — 기본 8)"
        default: "8"
        required: false
      skip_geocode:
        description: "카카오 지오코딩 skip (true=cache hit만, false=신규 호출)"
        default: "false"
        required: false
      skip_map:
        description: "apartment_school_map 재매핑 skip (true/false)"
        default: "false"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
      KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
      SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      HAKGUN_DATA_DIR:     ${{ github.workspace }}/data/realestate-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci

      - name: 인자 결정
        id: cfg
        run: |
          MONTHS_IN="${{ inputs.months }}"
          if [ -z "$MONTHS_IN" ]; then
            # 빈 값 유지 → script에서 recent N개월 default 사용 (이번 달 포함)
            MONTHS_IN=""
          fi
          echo "months=$MONTHS_IN" >> $GITHUB_OUTPUT
          echo "사용 months='$MONTHS_IN' recent=${{ inputs.recent || '12' }} force_recent=${{ inputs.force_recent || '2' }} type=${{ inputs.type }} lawd=${{ inputs.lawd_filter }} workers=${{ inputs.workers }}"

      - name: 부동산 fetch (전국 또는 filter)
        run: |
          mkdir -p "$HAKGUN_DATA_DIR/realestate/fullcountry"
          ARGS="--type ${{ inputs.type || 'both' }} --workers ${{ inputs.workers || '8' }} --force-recent ${{ inputs.force_recent || '2' }}"
          if [ -n "${{ steps.cfg.outputs.months }}" ]; then
            ARGS="$ARGS --months ${{ steps.cfg.outputs.months }}"
          else
            ARGS="$ARGS --recent ${{ inputs.recent || '12' }}"
          fi
          if [ -n "${{ inputs.lawd_filter }}" ]; then
            ARGS="$ARGS --lawd-filter ${{ inputs.lawd_filter }}"
          fi
          echo "ARGS=$ARGS"
          npx tsx scripts/run-realestate-fullcountry.ts $ARGS

      - name: Supabase 적재 (apartments / transactions / rentals)
        run: |
          ARGS="--force-recent ${{ inputs.force_recent || '2' }}"
          if [ "${{ inputs.skip_geocode }}" = "true" ]; then ARGS="$ARGS --skip-geocode"; fi
          if [ "${{ inputs.type }}" = "trade" ]; then ARGS="$ARGS --skip-rent"; fi
          if [ "${{ inputs.type }}" = "rent" ];  then ARGS="$ARGS --skip-tx"; fi
          npx tsx scripts/import-realestate-fullcountry.ts $ARGS

      - name: 아파트 ↔ 학교 매핑 (반경 1km, SQL RPC)
        if: inputs.skip_map != 'true'
        run: |
          npx tsx scripts/map-apartments.ts --mode sql --km 1

      - name: 결과 요약
        run: |
          echo "::notice::Realestate sync 완료 — months=${{ steps.cfg.outputs.months }} type=${{ inputs.type || 'both' }}"
